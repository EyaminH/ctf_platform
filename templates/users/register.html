{% extends 'base.html' %}

{% block title %}Register - CTF Platform{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow mt-5">
            <div class="card-header bg-dark text-white text-center">
                <h4 class="m-0">Register</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label for="{{ field.id_for_label }}" class="form-label fw-bold">{{ field.label }}</label>
                            {{ field.errors }}
                            <input type="{{ field.field.widget.input_type|default:'text' }}" 
                                   name="{{ field.name }}" 
                                   id="{{ field.id_for_label }}" 
                                   class="form-control {% if field.errors %}is-invalid{% endif %}"
                                   {% if field.field.required %}required{% endif %}>
                            {% if field.help_text %}
                                <div class="form-text small opacity-75">{{ field.help_text|safe }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100 mt-2">Create Account</button>
                </form>
                <div class="mt-3 text-center">
                    <small class="text-muted">Already have an account? <a href="{% url 'login' %}">Login here</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
