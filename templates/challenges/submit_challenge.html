{% extends 'base.html' %}

{% block title %}Submit Challenge - CTF Platform{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h4 class="m-0">Submit New Challenge</h4>
            </div>
            <div class="card-body">
                <p class="text-muted small">Share your challenge with the community! Note: Challenges require admin approval before they appear on the platform.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="title" class="form-label fw-bold">Title</label>
                        <input type="text" name="title" id="title" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="category" class="form-label fw-bold">Category</label>
                        <select name="category" id="category" class="form-select" required>
                            <option value="" selected disabled>Select a category</option>
                            {% for category in categories %}
                                <option value="{{ category.id }}">{{ category.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="points" class="form-label fw-bold">Points</label>
                        <input type="number" name="points" id="points" class="form-control" value="10" min="1" required>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label fw-bold">Description</label>
                        <textarea name="description" id="description" rows="4" class="form-control" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="flag" class="form-label fw-bold">Correct Flag</label>
                        <input type="text" name="flag" id="flag" class="form-control" placeholder="CTF{...}" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Submit for Review</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
