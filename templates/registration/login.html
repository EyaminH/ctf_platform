{% extends 'base.html' %}

{% block title %}Login - CTF Platform{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow mt-5">
            <div class="card-header bg-dark text-white">
                <h4 class="m-0 text-center">Login</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label fw-bold">Username or Email</label>
                        <input type="text" name="username" autofocus maxlength="150" required id="id_username" class="form-control" placeholder="Enter username or email">
                    </div>
                    <div class="mb-3">
                        <label for="id_password" class="form-label fw-bold">Password</label>
                        <input type="password" name="password" required id="id_password" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
                <div class="mt-3 text-center">
                    <small class="text-muted">Don't have an account? <a href="{% url 'register' %}">Register here</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
