{% extends 'base.html' %}

{% block title %}Login - TigerLabBD{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-dark">Login</h2>
            <p class="text-muted">Access your account to continue.</p>
        </div>

        <div class="card shadow-sm border-0 p-4">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    {% if form.errors %}
                        <div class="alert alert-danger border-0 small py-2 mb-4">
                            <i class="bi bi-exclamation-circle-fill me-2"></i>
                            Incorrect username or password. Please try again.
                        </div>
                    {% endif %}

                    <div class="mb-4">
                        <label for="id_username" class="form-label fw-600 text-dark small mb-2">Username or Email</label>
                        <input type="text" name="username" autofocus maxlength="150" required id="id_username" class="form-control border-secondary border-opacity-25 py-2" placeholder="Enter username or email">
                    </div>
                    
                    <div class="mb-4">
                        <label for="id_password" class="form-label fw-600 text-dark small mb-2">Password</label>
                        <input type="password" name="password" required id="id_password" class="form-control border-secondary border-opacity-25 py-2" placeholder="Enter password">
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 py-2 fw-bold">
                        Login
                    </button>
                </form>

                <div class="mt-4 pt-4 border-top text-center">
                    <p class="text-muted small mb-0">Don't have an account? <a href="{% url 'register' %}" class="text-primary text-decoration-none fw-bold">Create one</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
