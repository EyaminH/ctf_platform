{% extends 'base.html' %}

{% block title %}Operator Authentication - TigerLabBD{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="text-center mb-4">
            <img src="/static/images/logo.png" alt="TigerLabBD Logo" class="mb-3" style="max-height: 80px; filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.3));">
            <h2 class="fw-bold text-white">Operator Access</h2>
            <p class="text-muted">Secure authentication required for terminal access.</p>
        </div>

        <div class="card border-0 shadow-lg p-4">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="id_username" class="form-label text-muted small text-uppercase tracking-widest fw-bold mb-2">Identifier (Username/Email)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary border-opacity-25 text-primary"><i class="bi bi-person-fill"></i></span>
                            <input type="text" name="username" autofocus maxlength="150" required id="id_username" class="form-control bg-dark text-white border-secondary border-opacity-25 py-2" placeholder="Operator ID or Email">
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="id_password" class="form-label text-muted small text-uppercase tracking-widest fw-bold mb-2">Access Key (Password)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary border-opacity-25 text-primary"><i class="bi bi-shield-lock-fill"></i></span>
                            <input type="password" name="password" required id="id_password" class="form-control bg-dark text-white border-secondary border-opacity-25 py-2" placeholder="••••••••">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 py-3 fw-bold text-uppercase tracking-wider">
                        Authenticate <i class="bi bi-box-arrow-in-right ms-1"></i>
                    </button>
                </form>

                <div class="mt-4 pt-4 border-top border-white border-opacity-5 text-center">
                    <p class="text-muted small mb-0">New Operator? <a href="{% url 'register' %}" class="text-primary text-decoration-none fw-bold">Enlist Now</a></p>
                </div>
            </div>
        </div>
        
        <div class="mt-4 text-center">
            <small class="text-muted opacity-50 mono">TRANSMISSION ENCRYPTED | AES-256</small>
        </div>
    </div>
</div>
{% endblock %}
